# Example pipeline configuration for config-driven presets.
# Copy to pipeline.config.yaml and customize.
#
# Presets define the ordered list of agent steps.
# Each step: name (agent identifier), optional skip condition.

presets:
  standard:
    - name: solver
    - name: skeptic
